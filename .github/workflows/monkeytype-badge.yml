name: Update Monkeytype Badge

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch WPM and update Gist
        env:
          MONKEYTYPE_API_KEY: ${{ secrets.MONKEYTYPE_KEY }}
          GIST_SECRET: ${{ secrets.GIST_SECRET }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          api_key     = os.environ["MONKEYTYPE_API_KEY"]
          gist_secret = os.environ["GIST_SECRET"]
          gist_id     = os.environ["GIST_ID"]

          # 1. Fetch personal bests
          req = urllib.request.Request(
              "https://api.monkeytype.com/users/personalBests?mode=time&mode2=60",
              headers={"Authorization": f"ApeKey {api_key}"}
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          pbs = data.get("data", {}).get("time", {}).get("60", [])
          wpm = str(round(max(pbs, key=lambda x: x.get("wpm", 0))["wpm"])) + " wpm" if pbs else "N/A"
          print(f"WPM: {wpm}")

          # 2. Build valid shields.io endpoint JSON
          badge = {
              "schemaVersion": 1,
              "label": "monkeytype",
              "message": wpm,
              "color": "orange"
          }

          # 3. Update Gist
          payload = json.dumps({
              "files": {
                  "monkeytype.json": {
                      "content": json.dumps(badge)
                  }
              }
          }).encode()

          req2 = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              data=payload,
              method="PATCH",
              headers={
                  "Authorization": f"token {gist_secret}",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req2) as r:
              print("Gist updated:", r.status)
          EOF
