name: generate readme

permissions:
    contents: write

on:
    schedule:
        - cron: "0 */6 * * *" # every 6 hours
    workflow_dispatch:

jobs:
    download-svg:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20.x"

            - name: Download Monkeytype SVG
              run: |
                  mkdir -p public
                  curl -o public/monkeytype-readme-pb.svg https://monkeytype-readme.zeabur.app/generate-svg/FrankensteinRjR/THEMES?pb=true
                  perl -0777 -i -pe 's/viewBox="0 0 500 660" width="500" height="660"/viewBox="0 220 500 220" width="500" height="220"/g' public/monkeytype-readme-pb.svg
            - name: Publish generated assets
              uses: crazy-max/ghaction-github-pages@v4.0.0
              with:
                  target_branch: monkeytype-readme
                  build_dir: public
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

